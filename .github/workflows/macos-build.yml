name: macOS Build

on:
  pull_request:
    branches: ["**"]
    paths:
      - "apps/web/**"
      - "apps/macos/**"
      - ".github/workflows/macos-build.yml"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS DMG (arm64)
    runs-on: macos-15          # Apple Silicon (M4 Pro) runner
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/macos/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        id: web-cache
        with:
          path: |
            apps/web/.next/cache
            apps/web/.next/standalone
            apps/web/.next/static
            apps/web/public
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json', 'apps/web/src/**') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Next.js (standalone)
        if: steps.web-cache.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}

      - name: Ensure web/public exists
        run: mkdir -p apps/web/public

      - name: Install macOS app dependencies
        working-directory: apps/macos
        run: npm ci

      - name: Build DMG (arm64)
        working-directory: apps/macos
        run: npx electron-builder --mac dmg --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: huigu-ai-macos-arm64-${{ steps.sha.outputs.short }}
          path: apps/macos/dist/*.dmg
          retention-days: 14
          if-no-files-found: error

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('🖥️ 慧股AI macOS')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
              body: [
                '## 🖥️ 慧股AI macOS (Apple Silicon)',
                '',
                '✅ **macOS 客户端构建成功！**',
                '',
                `| 字段 | 值 |`,
                `|------|-----|`,
                `| 🏗️ 架构 | arm64 (M4 Max 原生) |`,
                `| 🔖 Commit | \`${sha}\` |`,
                `| 📥 下载 | [前往 Actions 下载 DMG](${runUrl}) |`,
                '',
                '> 下载 DMG → 拖入「应用程序」→ 右键打开（CI 构建未签名）',
                '',
                '---',
                '*GitHub Actions · macos-15 runner · 保留 14 天*',
              ].join('\n'),
            });
