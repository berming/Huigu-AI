name: Android APK Build

on:
  pull_request:
    branches: ["**"]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      # ── 3. Java ────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm dependencies ────────────────────────────────────────
      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      # ── 6. Cache android/ generated dir ───────────────────────────────────
      #  Key = hash of package-lock.json + app.json.
      #  On cache hit we skip expo prebuild entirely (saves ~3-5 min).
      - name: Restore android/ cache
        uses: actions/cache@v4
        id: android-dir-cache
        with:
          path: apps/mobile/android
          key: android-prebuild-${{ runner.os }}-${{ hashFiles('apps/mobile/package-lock.json', 'apps/mobile/app.json') }}

      # ── 7. Prepare adaptive icon (only before prebuild) ────────────────────
      - name: Prepare adaptive icon
        if: steps.android-dir-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: |
          if [ ! -f assets/adaptive-icon.png ]; then
            cp assets/icon.png assets/adaptive-icon.png
          fi

      # ── 8. Expo Prebuild — skipped on cache hit ────────────────────────────
      #  No --clean so the cached android/ dir is preserved across runs.
      - name: Expo Prebuild (Android)
        if: steps.android-dir-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || 'http://localhost:8000' }}

      # ── 9. Cache Gradle wrapper + caches + build-cache ────────────────────
      #  Stable key (package-lock.json) because android/ is now separately cached.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 10. Configure Gradle for speed ────────────────────────────────────
      - name: Configure Gradle properties
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          PROPS="gradle.properties"
          grep -q "org.gradle.caching"           $PROPS || echo "org.gradle.caching=true"           >> $PROPS
          grep -q "org.gradle.parallel"          $PROPS || echo "org.gradle.parallel=true"          >> $PROPS
          grep -q "org.gradle.configureondemand" $PROPS || echo "org.gradle.configureondemand=true" >> $PROPS

      # ── 11. Build debug APK ────────────────────────────────────────────────
      #  --build-cache  reuses task outputs stored in ~/.gradle/build-cache
      #  --parallel     builds independent subprojects concurrently
      #  workers=4      ubuntu-latest has 4 vCPUs
      #  -PbundleInDebug=false  skip JS bundle in debug (use Metro instead)
      - name: Build debug APK (with JS bundle)
        working-directory: apps/mobile/android
        run: >
          ./gradlew assembleDebug
          --no-daemon
          --build-cache
          --parallel
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Dorg.gradle.workers.max=4
            -Dorg.gradle.caching=true
            -Dkotlin.incremental=true
            -Xmx6g
            -XX:MaxMetaspaceSize=512m

      # ── 12. Rename APK ─────────────────────────────────────────────────────
      - name: Rename APK
        id: rename
        run: |
          APK_SOURCE="apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          PR_NUM="${{ github.event.pull_request.number || 'manual' }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          APK_NAME="huigu-ai-pr${PR_NUM}-${SHORT_SHA}-debug.apk"
          mkdir -p dist
          cp "$APK_SOURCE" "dist/$APK_NAME"
          echo "apk_path=dist/$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      # ── 13. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 14. Comment on PR ──────────────────────────────────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            const artifactName = '${{ steps.rename.outputs.apk_name }}';
            const runId = context.runId;
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const artifactUrl = `${repoUrl}/actions/runs/${runId}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('🤖 慧股AI Android APK')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '## 🤖 慧股AI Android APK',
                '',
                '✅ **构建成功！** Android 调试包已就绪。',
                '',
                `| 字段 | 值 |`,
                `|------|-----|`,
                `| 📦 APK 文件 | \`${artifactName}\` |`,
                `| 🔖 Commit | \`${sha}\` |`,
                `| 📥 下载地址 | [点击前往 Actions 页面下载](${artifactUrl}) |`,
                '',
                '> **安装说明：** 下载 APK 后，在 Android 手机上开启"未知来源安装"，然后安装即可。',
                '> 这是单机版 Release APK，无需后台服务器，数据内置。',
                '',
                '---',
                '*由 GitHub Actions 自动构建 · 保留 30 天*',
              ].join('\n'),
            });
