name: Web Build

on:
  pull_request:
    branches: ["**"]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-build.yml"
  workflow_dispatch:

jobs:
  build-web:
    name: Build Next.js Web App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      # ── 4. Build ────────────────────────────────────────────────────────────
      - name: Build Next.js app
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}

      # ── 5. Upload build artifact ────────────────────────────────────────────
      - name: Upload standalone build
        uses: actions/upload-artifact@v4
        with:
          name: web-standalone-${{ github.sha }}
          path: apps/web/.next/standalone
          retention-days: 7

      # ── 6. Comment on PR ────────────────────────────────────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('🌐 慧股AI Web')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber,
              body: [
                '## 🌐 慧股AI Web',
                '',
                '✅ **Web 构建成功！** Next.js standalone 包已就绪。',
                '',
                `| 字段 | 值 |`,
                `|------|-----|`,
                `| 🔖 Commit | \`${sha}\` |`,
                `| 📥 产物 | [点击前往 Actions 页面下载](${runUrl}) |`,
                '',
                '---',
                '*由 GitHub Actions 自动构建 · 保留 7 天*',
              ].join('\n'),
            });
